services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: finbot
      POSTGRES_PASSWORD: finbot
      POSTGRES_DB: finbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:latest
    volumes:
      - redisdata:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8085:8085"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://finbot:finbot@postgres:5432/finbot
      REDIS_URL: redis://redis:6379
      PORT: "8085"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8085
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
